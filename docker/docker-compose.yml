services:
  pagelet:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pagelet
    restart: unless-stopped
    # host зЅ‘з»њжЁЎејЏпјљжіЁй‡ЉжЋ‰ portsпјЊеЏ–ж¶€жіЁй‡Љ network_mode
    # network_mode: host
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - pagelet-data:/app/apps/server/data
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DATABASE_PATH=./data/data.db
      - UPLOADS_DIR=./data/uploads
      - PROJECTS_DIR=./data/projects
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:${PORT:-3000}}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${PORT:-3000}/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pagelet-data:
